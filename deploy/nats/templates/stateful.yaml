apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: infra-nats
spec:
  selector:
    matchLabels:
      app: nats
  serviceName: "infra-nats"
  replicas: 1
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
      - name: nats
        image: nats:2.10.12
        ports:
        - containerPort: 4222
          name: nats