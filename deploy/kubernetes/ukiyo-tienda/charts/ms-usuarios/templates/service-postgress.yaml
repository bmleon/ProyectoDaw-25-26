{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.app.name }}-postgres
  namespace: {{ .Release.Namespace }}
spec:
  type: {{ .Values.postgres.service.type | default "ClusterIP" }}
  selector:
    app: {{ .Values.app.name }}-postgres
  ports:
    - port: {{ .Values.postgres.port }}
      targetPort: {{ .Values.postgres.port }}
      {{- if eq .Values.postgres.service.type "NodePort" }}
      nodePort: {{ .Values.postgres.service.nodePort }}
      {{- end }}
{{- end }}