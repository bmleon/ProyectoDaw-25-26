{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
    name: ms-usuarios-postgres
    namespace: {{ .Release.Namespace }}
spec:
    type: ClusterIP
    selector:
        app: ms-usuarios-postgres
        app.kubernetes.io/component: postgres
        app.kubernetes.io/instance: {{ .Release.Name }}
    ports:
        - name: pg
        port: {{ .Values.postgres.service.port }}
        targetPort: 5432
{{- end }}