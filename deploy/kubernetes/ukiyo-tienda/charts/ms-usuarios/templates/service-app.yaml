{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
    name: ukiyo-ms-usuarios-service
    namespace: {{ .Release.Namespace }}
spec:
    type: ClusterIP
    selector:
        app: ukiyo-ms-usuarios
    ports:
        - name: http
        port: {{ .Values.service.port }}
        targetPort: {{ .Values.app.containerPort }}
{{- end }}