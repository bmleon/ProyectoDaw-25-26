controller:
  componentName: "jenkins-controller"
  jenkinsUrl: "http://jenkins-bmleon.ukiyocazorla.es"
  
  # Ejecución como root para evitar problemas de permisos en MicroK8s
  runAsUser: 0
  fsGroup: 0

  admin:
    username: "admin"
    password: "admin123"

  resources:
    requests:
      cpu: "50m"
      memory: "512Mi" # Mínimo para que arranque en tu VPS
    limits:
      cpu: "1000m"
      memory: "1536Mi" # Límite para no saturar tu RAM

  persistence:
    enabled: true
    size: "8Gi"
    storageClass: "microk8s-hostpath"

  serviceType: ClusterIP

  sidecars:
    configAutoReload:
      enabled: true
      image:
        repository: "kiwigrid/k8s-sidecar" # Imagen correcta para el sidecar
        tag: "1.24.4"
      urlJenkins: "http://jenkins-bmleon.ukiyocazorla.es"

  ingress:
    enabled: true
    ingressClassName: "nginx" # Clase correcta para tu Ingress
    hostName: "jenkins-bmleon.ukiyocazorla.es" # Campo correcto según el Chart
    path: "/"
    annotations:
      nginx.ingress.kubernetes.io/proxy-body-size: "50m"

  installPlugins:
    - kubernetes:4306.vc91e951ea_eb_d
    - workflow-aggregator:600.vb_57cdd26fdd7
    - git:5.7.0
    - github
    - docker-workflow
    - credentials-binding
    - timestamper
    - pipeline-stage-view
    - ws-cleanup
    - configuration-as-code:1929.v036b_5a_e1f123

  installLatestPlugins: true
  javaOpts: "-Djava.net.preferIPv4Stack=true"

agent:
  enabled: true
  runAsUser: 0
  runAsGroup: 0