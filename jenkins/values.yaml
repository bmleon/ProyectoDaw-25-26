jenkins:
  controller:
    componentName: "jenkins-controller"
    jenkinsUrl: "http://jenkins-bmleon.ukiyocazorla.es"
    
    # Permisos de root para acceder al socket de Docker sin restricciones
    runAsUser: 0
    runAsGroup: 0
    fsGroup: 0
    
    admin:
      username: "admin"
      password: "admin123"
    
    resources:
      requests:
        cpu: "100m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "1536Mi"
    
    persistence:
      enabled: true
      storageClass: "microk8s-hostpath"
      size: "8Gi"
    
    serviceType: ClusterIP
    
    ingress:
      enabled: true
      ingressClassName: "nginx"
      hostName: "jenkins-bmleon.ukiyocazorla.es"
      path: "/"
      annotations:
        nginx.ingress.kubernetes.io/proxy-body-size: "50m"
        kubernetes.io/ingress.class: "nginx"
    
    installPlugins:
      - kubernetes
      - workflow-aggregator
      - git
      - docker-workflow
    
    installLatestPlugins: false
    javaOpts: "-Djava.net.preferIPv4Stack=true"
    
    # Desactivamos el Configuration as Code y sus contenedores sidecar que causan el CrashLoop
    JCasC:
      enabled: false
    sidecars:
      configAutoReload:
        enabled: false

  agent:
    enabled: true
    runAsUser: 0
    runAsGroup: 0