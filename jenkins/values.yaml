jenkins:
  controller:
    componentName: "jenkins-controller"
    jenkinsUrl: "http://jenkins-bmleon.ukiyocazorla.es"

    runAsUser: 1000
    fsGroup: 1000

    admin:
      username: "admin"
      password: "admin123"

    resources:
      requests:
        cpu: "50m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "1536Mi"

    persistence:
      enabled: true
      storageClass: "microk8s-hostpath"
      size: "8Gi"

    serviceType: ClusterIP

    ingress:
      enabled: true
      ingressClassName: "nginx"
      hostName: "jenkins-bmleon.ukiyocazorla.es"
      path: "/"
      annotations:
        nginx.ingress.kubernetes.io/proxy-body-size: "50m"

    installPlugins:
      - kubernetes:4306.vc91e951ea_eb_d
      - workflow-aggregator:600.vb_57cdd26fdd7
      - git:5.7.0
      - github
      - docker-workflow
      - credentials-binding
      - timestamper
      - pipeline-stage-view
      - ws-cleanup
      - configuration-as-code:1929.v036b_5a_e1f123

    installLatestPlugins: false

    javaOpts: "-Djava.net.preferIPv4Stack=true"

  agent:
    enabled: true
    runAsUser: 1000
    runAsGroup: 1000