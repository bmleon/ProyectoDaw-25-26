jenkins:
  controller:
    componentName: "jenkins-controller"
    jenkinsUrl: "http://jenkins-bmleon.ukiyocazorla.es"
    runAsUser: 0
    fsGroup: 0
    admin:
      username: "admin"
      password: "admin123"
    resources:
      requests:
        cpu: "50m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "1536Mi"
    persistence:
      enabled: true
      size: "8Gi"
      storageClass: "microk8s-hostpath"
    serviceType: ClusterIP
    sidecars:
      configAutoReload:
        enabled: true
        image:
          repository: "kiwigrid/k8s-sidecar"
          tag: "1.24.4"
        urlJenkins: "http://jenkins-bmleon.ukiyocazorla.es"
    ingress:
      enabled: true
      ingressClassName: "nginx"
      hostName: "jenkins-bmleon.ukiyocazorla.es"
      path: "/"
      annotations:
        nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    installPlugins:
      - kubernetes:4306.vc91e951ea_eb_d
      - workflow-aggregator:600.vb_57cdd26fdd7
      - git:5.7.0
      - github
      - docker-workflow
      - credentials-binding
      - timestamper
      - pipeline-stage-view
      - ws-cleanup
      - configuration-as-code:1929.v036b_5a_e1f123
    installLatestPlugins: true
    javaOpts: "-Djava.net.preferIPv4Stack=true"
    customInitContainers:
      - name: install-kubectl
        image: bitnami/kubectl:latest
        securityContext:
          runAsUser: 0
        command:
          - sh
          - -c
          - cp /opt/bitnami/kubectl/bin/kubectl /tmp/kubectl/kubectl && chmod +x /tmp/kubectl/kubectl
        volumeMounts:
          - name: kubectl-bin
            mountPath: /tmp/kubectl
    additionalExistingClaimVolumes: []
    additionalVolumes:
      - name: kubectl-bin
        emptyDir: {}
    additionalVolumeMounts:
      - name: kubectl-bin
        mountPath: /usr/local/bin/kubectl
        subPath: kubectl
  agent:
    enabled: true
    runAsUser: 0
    runAsGroup: 0