controller:
  runAsUser: 0
  fsGroup: 0
  admin:
    username: admin
    password: admin123
  persistence:
    enabled: true
    size: 8Gi
    storageClass: microk8s-hostpath
  serviceType: NodePort
  nodePort: 30080
  sidecars:
    configAutoReload:
      enabled: true
      image:
        repository: kiwigrid/k8s-sidecar
        tag: "1.24.4"
  ingress:
    enabled: true
    className: nginx
    host: jenkins.ukiyocazorla.es
  additionalPlugins: []
  installPlugins:
    - kubernetes
    - workflow-aggregator
    - git
    - github
    - docker-workflow
    - credentials-binding
    - timestamper
    - pipeline-stage-view
    - ws-cleanup
  javaOpts: "-Djenkins.install.runSetupWizard=false"
agent:
  enabled: true
  runAsUser: 0
  runAsGroup: 0